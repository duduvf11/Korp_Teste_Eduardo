<h3>Cadastrar Novo Produto</h3>

<form (ngSubmit)="salvarProduto()">

  <div>
    <label for="descricao">Descrição:</label>
    <input type="text" name="descricao" [(ngModel)]="produto.descricao" placeholder="Nome do produto">
  </div>

  <div>
    <label for="saldo">Saldo:</label>
    <input type="number" name="saldo" [(ngModel)]="produto.saldo" placeholder="Quantidade">
  </div>

  <div>
    <label for="preco">Preço:</label>
    <input type="number" name="preco" [(ngModel)]="produto.preco" placeholder="Valor">
  </div>

  <button type="submit">Salvar Produto</button>

</form>

<hr>
<h3>Produtos em Estoque</h3>

<table>
  <thead>
    <tr>
      <th>Código</th>
      <th>Descrição</th>
      <th>Saldo</th>
      <th>Preço</th>
    </tr>
  </thead>
  <tbody>
    @for (item of listaProdutos(); track item.codigo) {
      <tr>
        <td>{{ item.codigo }}</td>
        <td>{{ item.descricao }}</td>
        <td>{{ item.saldo }}</td>
        <td>{{ item.preco | currency:'BRL' }}</td>
      </tr>
    } @empty {
      <tr>
        <td colspan="4">Nenhum produto cadastrado na despensa.</td>
      </tr>
    }
  </tbody>
</table>
